<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${student.id != null ? 'Edit Student' : 'Add Student'}">Student Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1>🏫 School Management Dashboard</h1>
                <nav class="nav">
                    <a href="/" class="nav-link">Dashboard</a>
                    <a href="/students" class="nav-link active">Students</a>
                    <a href="/teachers" class="nav-link">Teachers</a>
                </nav>
            </div>
        </header>

        <main class="main-content">
            <div class="card">
                <div class="card-header">
                    <h2 th:text="${student.id != null ? '✏️ Edit Student' : '➕ Add New Student'}">Student Form</h2>
                    <a href="/students" class="btn btn-secondary btn-small">Back to List</a>
                </div>

                <div style="padding: 2rem;">
                    <form th:action="@{${student.id != null ? '/students/' + student.id : '/students'}}" 
                          th:object="${student}" method="post">
                        
                        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem;">
                            <!-- First Name -->
                            <div class="form-group">
                                <label class="form-label">First Name *</label>
                                <input type="text" class="form-input" th:field="*{firstName}" required>
                                <span class="alert-error" th:if="${#fields.hasErrors('firstName')}" 
                                      th:errors="*{firstName}"></span>
                            </div>

                            <!-- Last Name -->
                            <div class="form-group">
                                <label class="form-label">Last Name *</label>
                                <input type="text" class="form-input" th:field="*{lastName}" required>
                                <span class="alert-error" th:if="${#fields.hasErrors('lastName')}" 
                                      th:errors="*{lastName}"></span>
                            </div>

                            <!-- Email -->
                            <div class="form-group">
                                <label class="form-label">Email *</label>
                                <input type="email" class="form-input" th:field="*{email}" required>
                                <span class="alert-error" th:if="${#fields.hasErrors('email')}" 
                                      th:errors="*{email}"></span>
                            </div>

                            <!-- Date of Birth -->
                            <div class="form-group">
                                <label class="form-label">Date of Birth *</label>
                                <input type="date" class="form-input" th:field="*{dateOfBirth}" required>
                                <span class="alert-error" th:if="${#fields.hasErrors('dateOfBirth')}" 
                                      th:errors="*{dateOfBirth}"></span>
                            </div>

                            <!-- Gender -->
                            <div class="form-group">
                                <label class="form-label">Gender *</label>
                                <select class="form-select" th:field="*{gender}" required>
                                    <option value="">Select Gender</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                                <span class="alert-error" th:if="${#fields.hasErrors('gender')}" 
                                      th:errors="*{gender}"></span>
                            </div>

                            <!-- Roll Number -->
                            <div class="form-group">
                                <label class="form-label">Roll Number *</label>
                                <input type="text" class="form-input" th:field="*{rollNumber}" required>
                                <span class="alert-error" th:if="${#fields.hasErrors('rollNumber')}" 
                                      th:errors="*{rollNumber}"></span>
                            </div>

                            <!-- Grade -->
                            <div class="form-group">
                                <label class="form-label">Grade *</label>
                                <select class="form-select" th:field="*{grade}" required>
                                    <option value="">Select Grade</option>
                                    <option value="9">Grade 9</option>
                                    <option value="10">Grade 10</option>
                                    <option value="11">Grade 11</option>
                                    <option value="12">Grade 12</option>
                                </select>
                                <span class="alert-error" th:if="${#fields.hasErrors('grade')}" 
                                      th:errors="*{grade}"></span>
                            </div>

                            <!-- Class Section -->
                            <div class="form-group">
                                <label class="form-label">Class Section *</label>
                                <select class="form-select" th:field="*{classSection}" required>
                                    <option value="">Select Section</option>
                                    <option value="A">Section A</option>
                                    <option value="B">Section B</option>
                                    <option value="C">Section C</option>
                                </select>
                                <span class="alert-error" th:if="${#fields.hasErrors('classSection')}" 
                                      th:errors="*{classSection}"></span>
                            </div>

                            <!-- Phone Number -->
                            <div class="form-group">
                                <label class="form-label">Phone Number</label>
                                <input type="tel" class="form-input" th:field="*{phoneNumber}">
                            </div>

                            <!-- Parent Name -->
                            <div class="form-group">
                                <label class="form-label">Parent Name</label>
                                <input type="text" class="form-input" th:field="*{parentName}">
                            </div>

                            <!-- Parent Phone -->
                            <div class="form-group">
                                <label class="form-label">Parent Phone</label>
                                <input type="tel" class="form-input" th:field="*{parentPhone}">
                            </div>

                            <!-- Status -->
                            <div class="form-group">
                                <label class="form-label">Status</label>
                                <select class="form-select" th:field="*{status}">
                                    <option value="ACTIVE">Active</option>
                                    <option value="INACTIVE">Inactive</option>
                                    <option value="GRADUATED">Graduated</option>
                                    <option value="TRANSFERRED">Transferred</option>
                                </select>
                            </div>
                        </div>

                        <!-- Address (Full Width) -->
                        <div class="form-group">
                            <label class="form-label">Address</label>
                            <textarea class="form-textarea" th:field="*{address}"></textarea>
                        </div>

                        <!-- Remarks (Full Width) -->
                        <div class="form-group">
                            <label class="form-label">Remarks</label>
                            <textarea class="form-textarea" th:field="*{remarks}"></textarea>
                        </div>

                        <!-- Buttons -->
                        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                            <button type="submit" class="btn btn-primary">
                                <span th:text="${student.id != null ? 'Update Student' : 'Create Student'}">Submit</span>
                            </button>
                            <a href="/students" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2025 School Management System. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
