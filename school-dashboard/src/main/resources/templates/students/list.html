<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students - School Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>🏫 School Management Dashboard</h1>
                <nav class="nav">
                    <a href="/" class="nav-link">Dashboard</a>
                    <a href="/students" class="nav-link active">Students</a>
                    <a href="/teachers" class="nav-link">Teachers</a>
                </nav>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <div class="card">
                <div class="card-header">
                    <h2>👨‍🎓 Students</h2>
                    <a href="/students/new" class="btn btn-primary">Add New Student</a>
                </div>

                <!-- Search -->
                <div style="padding: 1.5rem;">
                    <form class="search-box" method="get">
                        <input type="text" name="search" class="search-input" 
                               placeholder="Search by name, email, or roll number..."
                               th:value="${search}">
                        <button type="submit" class="btn btn-primary">Search</button>
                        <a href="/students" class="btn btn-secondary" th:if="${search}">Clear</a>
                    </form>
                </div>

                <!-- Alerts -->
                <div style="padding: 0 1.5rem;" th:if="${success}">
                    <div class="alert alert-success" th:text="${success}"></div>
                </div>
                <div style="padding: 0 1.5rem;" th:if="${error}">
                    <div class="alert alert-error" th:text="${error}"></div>
                </div>

                <!-- Table -->
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Roll Number</th>
                                <th>Name</th>
                                <th>Grade</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="student : ${students}">
                                <td th:text="${student.rollNumber}">10A001</td>
                                <td th:text="${student.fullName}">Student Name</td>
                                <td th:text="${student.grade + ' - ' + student.classSection}">10-A</td>
                                <td th:text="${student.email}"><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="d5b0b8b4bcb995a6b6bdbabab9fbb6bab8">[email&#160;protected]</a></td>
                                <td th:text="${student.phoneNumber}">555-0000</td>
                                <td>
                                    <span class="badge badge-success" 
                                          th:if="${student.status.name() == 'ACTIVE'}"
                                          th:text="${student.status}">Active</span>
                                    <span class="badge badge-danger" 
                                          th:if="${student.status.name() != 'ACTIVE'}"
                                          th:text="${student.status}">Inactive</span>
                                </td>
                                <td>
                                    <div class="actions">
                                        <a th:href="@{/students/{id}(id=${student.id})}" 
                                           class="btn btn-small btn-primary">View</a>
                                        <a th:href="@{/students/{id}/edit(id=${student.id})}" 
                                           class="btn btn-small btn-secondary">Edit</a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
